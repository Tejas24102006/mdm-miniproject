<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Dashboard - Smart Local Services</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body style="background: var(--bg-color);">

    <header>
        <a href="../index.html" class="logo">🛠️ LocalServe</a>
        <nav>
            <ul id="auth-links"></ul> 
            <ul id="user-nav" style="display: none;"></ul>
        </nav>
    </header>

    <div class="container">
        <h2>My Bookings</h2>
        <div id="dashAlert"></div>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Service</th>
                        <th>Provider</th>
                        <th>Price</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="bookingsTableBody">
                    <tr><td colspan="6">Loading your bookings...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Review Modal -->
    <div id="reviewModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
        <div style="background: white; padding: 2rem; border-radius: 1rem; max-width: 400px; width: 90%;">
            <h3>Submit Review</h3>
            <div id="reviewAlert"></div>
            <div class="form-group">
                <label>Rating (1-5)</label>
                <input type="number" id="reviewRating" min="1" max="5" value="5" required>
            </div>
            <div class="form-group">
                <label>Comment</label>
                <textarea id="reviewComment" rows="3" placeholder="How was the service?"></textarea>
            </div>
            <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                <button class="btn" onclick="submitReview()" id="confirmReviewBtn" style="flex: 1;">Submit</button>
                <button class="btn btn-outline" onclick="closeReviewModal()" style="flex: 1;">Cancel</button>
            </div>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script>
        let currentBookingForReview = null;
        let user = null;

        document.addEventListener('DOMContentLoaded', () => {
            user = JSON.parse(localStorage.getItem('sls_user'));
            if (!user || user.role !== 'customer') {
                window.location.href = 'login.html';
                return;
            }
            fetchCustomerBookings();
        });

        async function fetchCustomerBookings() {
            const tbody = document.getElementById('bookingsTableBody');
            try {
                const res = await fetch(`${API_URL}/bookings/get_bookings.php?customer_id=${user.id}`);
                const data = await res.json();
                
                if (data.status === 'success') {
                    tbody.innerHTML = '';
                    if (data.data.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">You have no bookings yet.</td></tr>';
                        return;
                    }

                    data.data.forEach(b => {
                        let actionHtml = '';
                        if (b.status === 'completed') {
                            actionHtml = `<button class="btn btn-outline" style="padding: 0.25rem 0.75rem; font-size: 0.85rem;" onclick="openReviewModal(${b.id})">Leave Review</button>`;
                        } else {
                            actionHtml = '<span style="color:var(--text-light); font-size: 0.85rem;">No actions</span>';
                        }

                        tbody.innerHTML += `
                            <tr>
                                <td>${b.booking_date}</td>
                                <td>${b.service_name}</td>
                                <td>${b.provider_name}</td>
                                <td> ₹${b.price}</td>
                                <td><span class="badge ${b.status}">${b.status}</span></td>
                                <td>${actionHtml}</td>
                            </tr>
                        `;
                    });
                }
            } catch (err) {
                tbody.innerHTML = '<tr><td colspan="6" class="alert error">Failed to load bookings.</td></tr>';
            }
        }

        function openReviewModal(bookingId) {
            currentBookingForReview = bookingId;
            document.getElementById('reviewModal').style.display = 'flex';
        }

        function closeReviewModal() {
            document.getElementById('reviewModal').style.display = 'none';
            currentBookingForReview = null;
        }

        async function submitReview() {
            const rating = document.getElementById('reviewRating').value;
            const comment = document.getElementById('reviewComment').value;
            const btn = document.getElementById('confirmReviewBtn');
            
            btn.textContent = 'Submitting...';
            btn.disabled = true;

            try {
                const res = await fetch(`${API_URL}/reviews/add_review.php`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        booking_id: currentBookingForReview,
                        customer_id: user.id,
                        rating: rating,
                        comment: comment
                    })
                });
                const data = await res.json();
                
                if (data.status === 'success') {
                    showAlert('reviewAlert', 'Review submitted!', 'success');
                    setTimeout(() => {
                        closeReviewModal();
                        fetchCustomerBookings(); // Refresh list to maybe hide button? (Optional behavior handled backend/ui)
                    }, 1500);
                } else {
                    showAlert('reviewAlert', data.message || 'Error occurred.', 'error');
                }
            } catch (err) {
                showAlert('reviewAlert', 'Network error.', 'error');
            } finally {
                btn.textContent = 'Submit';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
